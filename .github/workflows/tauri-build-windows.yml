name: Tauri Build (Windows)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}\\src-tauri\\target
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          architecture: "x64"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version 2.10.1 --locked

      - name: Build Backend Sidecar (PyInstaller)
        shell: pwsh
        run: |
          ./scripts/build-backend-tauri-win.ps1

      - name: Build Tauri Installer
        working-directory: src-tauri
        run: cargo tauri build -b app

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: any-auto-register-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
